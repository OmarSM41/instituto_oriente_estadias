<!-- Navigation -->
  <nav class="bg-black shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <img
          src="/assets/logo-white-h.png"
          alt="Logo Instituto Oriente"
          class="h-10 w-auto object-contain transition-transform group-hover:scale-105"
        />
        <a routerLink="/" class="text-gray-200 hover:text-indigo-600 transition">Volver al Inicio</a>
      </div>
    </div>
  </nav>

<div class="min-h-screen bg-linear-to-br from-blue-50 to-indigo-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">

    <h1 class="text-3xl font-bold text-indigo-600 mb-2 text-center">Inscripción a Evento</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Información Personal -->
      <fieldset class="space-y-4 pb-6 border-b border-gray-200">
        <legend class="text-lg font-semibold text-gray-900 mb-4">Información Personal</legend>

        <div>
          <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo</label>
          <input
            id="fullName"
            type="text"
            formControlName="fullName"
            placeholder="Juan Pérez García"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
            required
            aria-required="true"
          />
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="juan@ejemplo.com"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
              required
              aria-required="true"
            />
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Teléfono</label>
            <input
              id="phone"
              type="tel"
              formControlName="phone"
              placeholder="+1 234 567 8900"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
              required
              aria-required="true"
            />
          </div>
        </div>

        <div>
          <label for="idNumber" class="block text-sm font-medium text-gray-700 mb-2">Número de Identificación</label>
          <input
            id="idNumber"
            type="text"
            formControlName="idNumber"
            placeholder="1234567890"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
            required
            aria-required="true"
          />
        </div>
      </fieldset>

      <!-- Información del Evento -->
      <fieldset class="space-y-4 pb-6 border-b border-gray-200">
        <legend class="text-lg font-semibold text-gray-900 mb-4">Selecciona tu Evento</legend>

        <div>
          <label for="eventType" class="block text-sm font-medium text-gray-700 mb-2">Tipo de Evento</label>
          <select
            id="eventType"
            formControlName="eventType"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white"
            required
            aria-required="true"
          >
            <option value="" disabled>Selecciona un evento</option>
            <option value="atletismo">Atletismo</option>
            <option value="futbol">Fútbol</option>
            <option value="voleibol">Voleibol</option>
            <option value="animacion">Animación</option>
            <option value="baloncesto">Baloncesto</option>
            <option value="rugby">Rugby</option>
            <option value="natacion">Natación</option>
          </select>
        </div>

        <div>
          <label for="eventDate" class="block text-sm font-medium text-gray-700 mb-2">Fecha del Evento</label>
          <input
            id="eventDate"
            type="date"
            formControlName="eventDate"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white"
            required
            aria-required="true"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-3">Categoría de Participación</label>
          <div class="space-y-2">
            <div class="flex items-center">
              <input
                id="student"
                type="radio"
                value="estudiante"
                formControlName="category"
                class="w-4 h-4 text-indigo-600 focus:ring-indigo-500"
                required
              />
              <label for="student" class="ml-3 text-sm text-gray-700">Estudiante</label>
            </div>
            <div class="flex items-center">
              <input
                id="staff"
                type="radio"
                value="personal"
                formControlName="category"
                class="w-4 h-4 text-indigo-600 focus:ring-indigo-500"
              />
              <label for="staff" class="ml-3 text-sm text-gray-700">Personal Administrativo</label>
            </div>
            <div class="flex items-center">
              <input
                id="external"
                type="radio"
                value="externo"
                formControlName="category"
                class="w-4 h-4 text-indigo-600 focus:ring-indigo-500"
              />
              <label for="external" class="ml-3 text-sm text-gray-700">Público Externo</label>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- Información Adicional -->
      <fieldset class="space-y-4">
        <legend class="text-lg font-semibold text-gray-900 mb-4">Información Adicional</legend>

        <div>
          <label for="comments" class="block text-sm font-medium text-gray-700 mb-2">Comentarios o Información Extra</label>
          <textarea
            id="comments"
            formControlName="comments"
            placeholder="Cuéntanos más sobre ti o tus intereses..."
            rows="4"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition resize-none"
            aria-label="Comentarios adicionales"
          ></textarea>
        </div>

        <div class="flex items-start">
          <input
            id="terms"
            type="checkbox"
            formControlName="termsAccepted"
            class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 mt-1"
            required
            aria-required="true"
          />
          <label for="terms" class="ml-3 text-sm text-gray-700">
            Acepto los términos y condiciones de participación
          </label>
        </div>
      </fieldset>

      <!-- Botones -->
      <div class="flex gap-4 pt-8">
        <button
          type="submit"
          [disabled]="!form.valid"
          class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
        >
          Inscribirse
        </button>
        <button
          type="reset"
          class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition"
        >
          Limpiar
        </button>
      </div>
    </form>
  </div>

</div>
<!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <p>&copy; 2026 Instituto Oriente. Todos los derechos reservados.</p>
    </div>
  </footer>
